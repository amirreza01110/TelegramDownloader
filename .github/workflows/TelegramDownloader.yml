name: TelegramDownloader

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: '🔗 Telegram post link(s) (comma-separated)'
        required: true
        type: string
      split_threshold_mb:
        description: '📦 Maximum file size per part (MB)'
        required: false
        type: number
        default: 90

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📂 Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq zip openssl

      - name: 📡 Process, Download, and Split links
        id: process_links
        run: |
          INPUT_LINKS="${{ github.event.inputs.telegram_link }}"
          THRESHOLD="${{ github.event.inputs.split_threshold_mb }}"
          
          mkdir -p downloads
          
          # Convert comma-separated string to an array
          IFS=',' read -ra LINKS <<< "$INPUT_LINKS"
          
          for LINK in "${LINKS[@]}"; do
            # Remove leading/trailing whitespaces
            LINK=$(echo "$LINK" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            
            if [ -z "$LINK" ]; then
              continue
            fi
            
            echo "═══════════════════════════════════════════════════════════════"
            echo "🔗 Processing link: $LINK"
            echo "═══════════════════════════════════════════════════════════════"
            
            RESPONSE=$(curl -s -X POST \
              -H "User-Agent: Mozilla/5.0" \
              -d "telegram_link=$LINK" \
              https://telegramdownloader.net/proxy.php)
            
            RAW_URL=$(echo "$RESPONSE" | jq -r '.data.data.link')
            FILE_NAME=$(echo "$RESPONSE" | jq -r '.data.data.file_name')
            
            if [ -z "$RAW_URL" ] || [ "$RAW_URL" = "null" ]; then
              echo "❌ Error: Could not get download link for $LINK! Skipping..."
              continue
            fi
            
            # Convert spaces to dash in URL
            CORRECTED_URL=$(echo "$RAW_URL" | sed 's/%20/-/g' | sed 's/ /-/g')
            
            echo "✅ Direct link received!"
            echo "📄 Original filename: $FILE_NAME"
            
            # Check if file already exists
            BASE_NAME="${FILE_NAME%.*}"
            EXT="${FILE_NAME##*.}"
            if [[ "$EXT" == "$FILE_NAME" ]]; then
              EXT=""
            else
              EXT=".$EXT"
            fi
            
            FINAL_NAME="$FILE_NAME"
            COUNTER=1
            
            # Keep checking and increment counter until unique name found
            while [ -f "downloads/$FINAL_NAME" ]; do
              FINAL_NAME="${BASE_NAME}_${COUNTER}${EXT}"
              COUNTER=$((COUNTER + 1))
            done
            
            if [ "$FINAL_NAME" != "$FILE_NAME" ]; then
              echo "⚠️ File already exists! Renaming to: $FINAL_NAME"
            fi
            
            echo "⬇️ Downloading: $FINAL_NAME"
            
            curl -L --progress-bar \
              --max-time 7200 \
              --retry 10 \
              --retry-delay 10 \
              -C - \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -H "Referer: https://telegramdownloader.net/" \
              -o "downloads/$FINAL_NAME" \
              "$CORRECTED_URL"
            
            if [ ! -f "downloads/$FINAL_NAME" ]; then
              echo "❌ Download failed for $FINAL_NAME!"
              continue
            fi
            
            SIZE=$(stat -c%s "downloads/$FINAL_NAME")
            
            if [ "$SIZE" -lt 1024 ]; then
              echo "❌ ERROR: Invalid file (${SIZE} bytes)"
              rm "downloads/$FINAL_NAME"
              continue
            fi
            
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "✅ Download complete! Size: ${SIZE_MB} MB"
            
            # Split large file
            LIMIT=$((THRESHOLD * 1024 * 1024))
            if [ "$THRESHOLD" != "0" ] && [ -n "$SIZE" ] && [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ Splitting into ${THRESHOLD}MB parts..."
              cd downloads
              zip -s "${THRESHOLD}m" "${FINAL_NAME}.zip" -j "$FINAL_NAME"
              rm "$FINAL_NAME"
              cd ..
            fi
            echo ""
          done

      - name: 🔄 Fix filenames (remove Persian/Arabic, special chars)
        run: |
          cd downloads
          
          for file in *; do
            [ -e "$file" ] || continue
            
            EXT="${file##*.}"
            if [[ "$EXT" == "$file" ]]; then
              EXT="bin"
            fi
            
            if [[ "$file" =~ [^[:ascii:]] ]]; then
              RANDOM_NAME=$(openssl rand -hex 8)
              NEW_NAME="${RANDOM_NAME}.${EXT}"
              echo "   🌐 Renaming: $file -> $NEW_NAME"
              mv "$file" "$NEW_NAME"
            else
              CLEAN_NAME=$(echo "$file" | sed 's/[^a-zA-Z0-9._-]/_/g' | sed 's/__*/_/g')
              if [ "$file" != "$CLEAN_NAME" ]; then
                echo "   📝 Cleaning: $file -> $CLEAN_NAME"
                mv "$file" "$CLEAN_NAME"
              fi
            fi
          done
          
          cd ..

      - name: 📤 Upload to GitHub (Batch upload - 1 file at a time)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ ! -d "downloads" ] || [ -z "$(ls -A downloads 2>/dev/null)" ]; then
            echo "⚠️ No files to upload!"
            exit 1
          fi
          
          # Get list of new files only (not already in git)
          NEW_FILES=()
          for file in downloads/*; do
            filename=$(basename "$file")
            if ! git ls-files --error-unmatch "downloads/$filename" &>/dev/null; then
              NEW_FILES+=("$filename")
            else
              echo "⏭️ Skipping already uploaded file: $filename"
            fi
          done
          
          TOTAL=${#NEW_FILES[@]}
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "✅ No new files to upload!"
            exit 0
          fi
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "📦 Total new files to upload: $TOTAL"
          echo "═══════════════════════════════════════════════════════════════"
          
          # Upload ONE file at a time
          for (( i=0; i<TOTAL; i++ )); do
            echo ""
            echo "🚀 Uploading file $((i+1)) of $TOTAL: ${NEW_FILES[$i]}"
            
            git add "downloads/${NEW_FILES[$i]}"
            git commit -m "Add ${NEW_FILES[$i]} [skip ci]"
            
            for attempt in 1 2 3; do
              if git push origin main 2>&1; then
                echo "   ✅ Uploaded successfully"
                break
              else
                if [ $attempt -lt 3 ]; then
                  echo "   ⚠️ Push failed, retry $attempt/3..."
                  git reset --soft HEAD~1
                  sleep 5
                else
                  echo "   ❌ Failed to upload ${NEW_FILES[$i]}"
                  git reset --soft HEAD~1
                fi
              fi
            done
            
            sleep 2
          done
          
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "🎉 All $TOTAL new files uploaded successfully!"
          echo ""
          echo "📂 Uploaded files:"
          ls -lh downloads/
          echo "═══════════════════════════════════════════════════════════════"

      - name: 📋 Final report
        if: always()
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│                   Download Final Report                    │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│ 🔗 Links processed: ${{ github.event.inputs.telegram_link }}"
          echo "│ 📁 Path: ./downloads/"
          echo "└─────────────────────────────────────────────────────────────┘"
